@import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Lato:wght@300;400;700&display=swap');
*{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#1e2d3d;--surface:#243547;--surface2:#2a3e52;--text:#f0ece3;--text2:#8faabf;--accent:#f0c060;--border:#2e4560}
body{background:var(--bg);color:var(--text);font-family:'Lato',sans-serif;min-height:100vh;overflow-x:hidden}
.app{display:grid;grid-template-columns:1fr 340px;min-height:100vh}
.left{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px 20px;background:var(--bg)}
.chart-title{font-family:'Playfair Display',serif;font-size:11px;letter-spacing:4px;text-transform:uppercase;color:var(--text2);margin-bottom:28px;text-align:center}
.chart-wrap{position:relative;width:480px;height:480px}
#dial{width:480px;height:480px}
.center-label{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);text-align:center;pointer-events:none;width:100px}
.center-label .epoch-name{font-family:'Playfair Display',serif;font-size:11px;color:var(--accent);opacity:0;transition:opacity .3s;line-height:1.35}
.center-label .epoch-year{font-size:9px;color:var(--text2);opacity:0;transition:opacity .3s;margin-top:2px}
.center-label.active .epoch-name,.center-label.active .epoch-year{opacity:1}
.right{border-left:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden;background:var(--surface)}
.list-header{padding:24px 22px 14px;border-bottom:1px solid var(--border);flex-shrink:0}
.list-header h1{font-family:'Playfair Display',serif;font-size:20px;color:var(--text);font-weight:400}
.list-header p{font-size:9px;color:var(--text2);margin-top:3px;letter-spacing:2px;text-transform:uppercase}
.epoch-list{overflow-y:auto;flex:1;padding:4px 0}
.epoch-list::-webkit-scrollbar{width:3px}
.epoch-list::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
.epoch-item{display:flex;align-items:center;padding:9px 22px;cursor:pointer;transition:background .15s;gap:11px}
.epoch-item:hover,.epoch-item.active{background:var(--surface2)}
.epoch-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;transition:transform .25s}
.epoch-item:hover .epoch-dot,.epoch-item.active .epoch-dot{transform:scale(1.7)}
.epoch-info{flex:1}
.epoch-info .name{font-size:12px;color:var(--text);transition:color .15s}
.epoch-item:hover .name,.epoch-item.active .name{color:var(--accent)}
.epoch-info .years{font-size:9px;color:var(--text2);margin-top:1px}
.epoch-arrow{font-size:11px;color:var(--text2);opacity:0;transition:opacity .15s}
.epoch-item:hover .epoch-arrow,.epoch-item.active .epoch-arrow{opacity:1}
.detail-page{display:none;flex-direction:column;background:var(--surface);position:absolute;inset:0;z-index:10;overflow-y:auto}
.detail-page.open{display:flex}
.detail-back{display:flex;align-items:center;gap:8px;padding:18px 22px 10px;cursor:pointer;font-size:10px;letter-spacing:2px;text-transform:uppercase;color:var(--text2);transition:color .2s;flex-shrink:0}
.detail-back:hover{color:var(--accent)}
.detail-hero{padding:0 22px 16px;flex-shrink:0}
.era-badge{display:inline-block;font-size:9px;letter-spacing:2px;text-transform:uppercase;padding:3px 10px;border-radius:2px;margin-bottom:10px;border:1px solid}
.detail-hero h2{font-family:'Playfair Display',serif;font-size:22px;font-weight:400;line-height:1.2;margin-bottom:5px;color:var(--text)}
.detail-hero .years-span{font-size:10px;color:var(--text2);letter-spacing:2px;margin-bottom:12px}
.detail-hero .summary{font-size:12px;color:var(--text2);line-height:1.75;margin-bottom:14px}
.sm-title{font-size:9px;letter-spacing:2px;text-transform:uppercase;color:var(--text2);margin-bottom:7px}
.stilmittel-tags{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:16px}
.stil-tag{font-size:10px;padding:3px 9px;border-radius:3px;border:1px solid;line-height:1.4}
.img-grid{padding:0 22px 24px;display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
.img-card{border-radius:6px;overflow:hidden;background:var(--bg);border:1px solid var(--border);cursor:pointer;transition:transform .2s,border-color .2s}
.img-card:hover{transform:translateY(-2px);border-color:var(--accent)}
.img-card img{width:100%;height:110px;object-fit:cover;display:block;background:#162230}
.img-card .img-label{padding:8px 10px}
.img-label .type{font-size:8px;letter-spacing:1.5px;text-transform:uppercase;color:var(--text2);margin-bottom:2px}
.img-label .title{font-size:10px;color:var(--text);line-height:1.35}
.lightbox{display:none;position:fixed;inset:0;z-index:100;background:rgba(0,0,0,.88);align-items:center;justify-content:center;flex-direction:column;gap:14px;padding:30px}
.lightbox.open{display:flex}
.lightbox img{max-width:90%;max-height:75vh;object-fit:contain;border-radius:6px;box-shadow:0 8px 40px rgba(0,0,0,.6)}
.lightbox .lb-caption{color:var(--text2);font-size:12px;text-align:center;max-width:480px;line-height:1.6}
.lightbox .lb-close{position:absolute;top:18px;right:22px;font-size:22px;cursor:pointer;color:var(--text2);transition:color .2s;background:none;border:none}
.lightbox .lb-close:hover{color:var(--text)}
</style>

(function() {
  var queries = ["Laocoon", "Parthenon Athens", "Venus de Milo", "Byzantine mosaic Justinian", "Hagia Sophia Istanbul", "Christ icon Byzantine", "Romanesque abbey church", "illuminated manuscript medieval", "golden madonna medieval sculpture", "Notre Dame Cathedral Paris Gothic", "Sainte Chapelle stained glass", "Ghent Altarpiece van Eyck", "Leonardo da Vinci portrait", "Michelangelo Sistine Chapel", "Botticelli Primavera", "El Greco burial", "Giambologna sculpture", "Pontormo Mannerism", "Rembrandt Night Watch", "Caravaggio Matthew", "Palace Versailles", "Jacques-Louis David Oath Horatii", "Canova Psyche sculpture", "Altes Museum Berlin Schinkel", "Caspar David Friedrich Wanderer fog", "Delacroix Liberty Leading the People", "Turner Rain Steam Speed", "Courbet Stone Breakers", "Millet Gleaners", "Rodin Burghers of Calais", "Monet Impression Sunrise", "Degas Ballet Class", "Renoir Moulin de la Galette", "Van Gogh Starry Night", "art history painting 34", "Gauguin Where Do We Come From", "Klimt The Kiss", "Redon Cyclops", "Franz von Stuck Sin", "Gaudi Sagrada Familia", "Alphonse Mucha poster", "Tiffany stained glass"];
  
  function loadARTIC(img, query) {
    var url = 'https://api.artic.edu/api/v1/artworks/search?q=' + 
              encodeURIComponent(query) + 
              '&fields=image_id,title&limit=1&query[term][is_public_domain]=true';
    fetch(url)
      .then(function(r) { return r.json(); })
      .then(function(data) {
        if (data.data && data.data[0] && data.data[0].image_id) {
          var imageId = data.data[0].image_id;
          img.src = 'https://www.artic.edu/iiif/2/' + imageId + '/full/400,/0/default.jpg';
        }
      })
      .catch(function() {});
  }
  
  window.addEventListener('load', function() {
    document.querySelectorAll('img[data-artic]').forEach(function(img) {
      var idx = parseInt(img.getAttribute('data-artic'));
      loadARTIC(img, queries[idx]);
    });
  });
})();
</script>

var cx=240,cy=240,RI=55,RM=215,GAP=1.2;

function calcAngles(){
  var tot=E.reduce(function(s,e){return s+Math.abs(e.to-e.from)*e.w;},0);
  var cur=270;
  return E.map(function(e){
    var deg=(Math.abs(e.to-e.from)*e.w/tot)*360*0.96;
    var s=cur;cur+=deg+GAP;return{s:s,en:s+deg};
  });
}
function pol(r,d){var a=(d-90)*Math.PI/180;return{x:cx+r*Math.cos(a),y:cy+r*Math.sin(a)};}
function arcD(r1,r2,a1,a2){
  var p1=pol(r1,a1),p2=pol(r1,a2),p3=pol(r2,a2),p4=pol(r2,a1),lg=a2-a1>180?1:0;
  return'M'+p1.x+','+p1.y+' A'+r1+','+r1+' 0 '+lg+' 1 '+p2.x+','+p2.y+' L'+p3.x+','+p3.y+' A'+r2+','+r2+' 0 '+lg+' 0 '+p4.x+','+p4.y+'Z';
}
function rgba(hex,a){var r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);return'rgba('+r+','+g+','+b+','+a+')';}

  if(h===undefined)h=-1;hov=h;
  svgEl.innerHTML='';
  var bg=document.createElementNS('http://www.w3.org/2000/svg','circle');
  bg.setAttribute('cx',cx);bg.setAttribute('cy',cy);bg.setAttribute('r',RM+18);bg.setAttribute('fill','#162230');svgEl.appendChild(bg);
  var cc=document.createElementNS('http://www.w3.org/2000/svg','circle');
  cc.setAttribute('cx',cx);cc.setAttribute('cy',cy);cc.setAttribute('r',RI);cc.setAttribute('fill','#1e2d3d');cc.setAttribute('stroke','#2e4560');cc.setAttribute('stroke-width','1');svgEl.appendChild(cc);

  E.forEach(function(e,i){
    var a=ANG[i],hi=hov===i,rO=hi?RM+13:RM;
    var path=document.createElementNS('http://www.w3.org/2000/svg','path');
    path.setAttribute('d',arcD(RI+4,rO,a.s,a.en));
    path.setAttribute('fill',rgba(e.c,hi?1:0.72));
    path.setAttribute('stroke','#162230');path.setAttribute('stroke-width','2');
    path.style.cursor='pointer';
    if(hi){
      var gl=document.createElementNS('http://www.w3.org/2000/svg','path');
      gl.setAttribute('d',arcD(rO+2,rO+6,a.s,a.en));
      gl.setAttribute('fill',rgba(e.c,0.3));gl.setAttribute('stroke','none');gl.setAttribute('pointer-events','none');
      svgEl.appendChild(gl);
    }
    (function(idx){
      path.addEventListener('mouseenter',function(){draw(idx);hilite(idx);showC(idx);});
      path.addEventListener('mouseleave',function(){draw(-1);hilite(-1);hideC();});
      path.addEventListener('click',function(){openD(idx);});
    })(i);
    svgEl.appendChild(path);
    var span=a.en-a.s;
    if(span>15){
      var mid=(a.s+a.en)/2,rL=(RI+4+rO)*0.56,pos=pol(rL,mid);
      var t=document.createElementNS('http://www.w3.org/2000/svg','text');
      t.setAttribute('x',pos.x);t.setAttribute('y',pos.y);t.setAttribute('text-anchor','middle');t.setAttribute('dominant-baseline','central');
      t.setAttribute('font-size','6.5');t.setAttribute('fill',hi?'#fff':rgba(e.c,0.2));
      t.setAttribute('font-family','Lato,sans-serif');t.setAttribute('font-weight','700');t.setAttribute('pointer-events','none');
      t.textContent=e.raw;svgEl.appendChild(t);
    }
  });
}

function hilite(idx){document.querySelectorAll('.epoch-item').forEach(function(el,j){el.classList.toggle('active',j===idx);});}
function showC(i){document.getElementById('centerName').innerHTML=E[i].name;document.getElementById('centerYear').textContent=E[i].years;document.getElementById('centerLabel').classList.add('active');}
function hideC(){document.getElementById('centerLabel').classList.remove('active');}

function buildList(){
  var list=document.getElementById('epochList');
  E.forEach(function(e,i){
    var item=document.createElement('div');item.className='epoch-item';
    item.innerHTML='<div class="epoch-dot" style="background:'+e.c+'"></div><div class="epoch-info"><div class="name">'+e.name+'</div><div class="years">'+e.years+'</div></div><div class="epoch-arrow">&#8594;</div>';
    (function(idx){
      item.addEventListener('mouseenter',function(){draw(idx);hilite(idx);showC(idx);});
      item.addEventListener('mouseleave',function(){draw(-1);hilite(-1);hideC();});
      item.addEventListener('click',function(){openD(idx);});
    })(i);
    list.appendChild(item);
  });
}

function openD(i){
  var e=E[i];
  document.getElementById('detailTitle').innerHTML=e.name;
  document.getElementById('detailYears').textContent=e.years;
  document.getElementById('detailSummary').textContent=e.summary;
  var badge=document.getElementById('detailBadge');
  badge.style.background=rgba(e.c,.15);badge.style.color=e.c;badge.style.borderColor=rgba(e.c,.35);
  document.getElementById('detailStil').innerHTML=e.stil.map(function(s){
    return'<span class="stil-tag" style="background:'+rgba(e.c,.12)+';color:'+e.c+';border-color:'+rgba(e.c,.28)+'">'+s+'</span>';
  }).join('');
  document.getElementById('detailImages').innerHTML=e.works.map(function(w,wi){
    return'<div class="img-card" onclick="openLB('+i+','+wi+')">'
      +'<img src="'+w.img+'" alt="'+w.n+'" loading="lazy">'
      +'<div class="img-label"><div class="type">'+w.t+'</div><div class="title">'+w.n+'</div></div>'
      +'</div>';
  }).join('');
  document.getElementById('detailPage').classList.add('open');
  document.getElementById('detailPage').scrollTop=0;
}
function closeDetail(){document.getElementById('detailPage').classList.remove('open');}

function openLB(i,wi){
  var w=E[i].works[wi];
  document.getElementById('lbImg').src=w.img;
  document.getElementById('lbCaption').textContent=w.n+' \u2014 '+w.t;
  document.getElementById('lightbox').classList.add('open');
}
function closeLB(e){
  if(!e||e.target===document.getElementById('lightbox')||e.target.classList.contains('lb-close')){
    document.getElementById('lightbox').classList.remove('open');
  }
}

draw();buildList();
</script>
